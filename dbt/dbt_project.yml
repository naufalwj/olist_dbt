
name: 'olist_operations_analysis'
version: '1.0.0'

profile: 'olist_operations_analysis'
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

models:
  olist_operations_analysis:
    staging:
      +materialized: view
      +schema: staging
      +enabled: true
    
    intermediate:
      +materialized: view
      +schema: intermediate
      +enabled: true

  